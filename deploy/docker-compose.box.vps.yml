# ============================================================
# Stack dedicado: BOX PERSONALIZADO (2º tenant no mesmo VPS)
# SEM Tailscale — o Athos é acessado por IP público e não há SMB.
# Nomes/portas/rede distintos do stack principal para nao colidir.
#
# Subir:
#   docker compose -f deploy/docker-compose.box.vps.yml --env-file deploy/box.env up -d --build
#
# IMPORTANTE: as NEXT_PUBLIC_* do frontend sao baked no build (args abaixo).
# Trocou a marca? Rebuild: ... up -d --build
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: box-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - box_net
    ports:
      - "5438:5432" # host:5438 (stack principal usa 5435 — sem colisao)
    volumes:
      - box_postgres_data:/var/lib/postgresql/data

  backend:
    # Reusa a imagem principal — o backend é idêntico (white-label é 100% runtime via EMPRESA_*).
    image: ${BACKEND_IMAGE:-ghcr.io/martoxak/orcamento-backend:latest}
    container_name: box-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - box_net
    ports:
      - "4035:4000" # host:4035 -> backend:4000
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      APP_BASE_URL: ${APP_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID}
      ATHOS_PG_HOST: ${ATHOS_PG_HOST}
      ATHOS_PG_DB: ${ATHOS_PG_DB}
      ATHOS_PG_USER: ${ATHOS_PG_USER}
      ATHOS_PG_PASS: ${ATHOS_PG_PASS}
      ATHOS_PG_PORT: ${ATHOS_PG_PORT}
      ATHOS_API_TOKEN: ${ATHOS_API_TOKEN}
      ATHOS_SISTEMA_USUARIO_ID: ${ATHOS_SISTEMA_USUARIO_ID}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL}
      MINIO_PATH_PREFIX: ${MINIO_PATH_PREFIX}
      BACKEND_URL: ${BACKEND_URL}
      EFI_BASE_URL: ${EFI_BASE_URL}
      EFI_COBRANCA_BASE_URL: ${EFI_COBRANCA_BASE_URL}
      EFI_CLIENT_ID: ${EFI_CLIENT_ID}
      EFI_CLIENT_SECRET: ${EFI_CLIENT_SECRET}
      EFI_PIX_KEY: ${EFI_PIX_KEY}
      EFI_CERT_PEM: ${EFI_CERT_PEM}
      EFI_KEY_PEM: ${EFI_KEY_PEM}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      EFI_WEBHOOK_SECRET: ${EFI_WEBHOOK_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NFSE_TOKEN: ${NFSE_TOKEN}
      NFSE_CNPJ_PRESTADOR: ${NFSE_CNPJ_PRESTADOR}
      NFSE_INSCRICAO_MUNICIPAL: ${NFSE_INSCRICAO_MUNICIPAL}
      NFSE_SOAP_URL: ${NFSE_SOAP_URL}
      NFSE_AUX_URL: ${NFSE_AUX_URL}
      EMPRESA_NOME: ${EMPRESA_NOME}
      EMPRESA_CNPJ: ${EMPRESA_CNPJ}
      EMPRESA_ENDERECO: ${EMPRESA_ENDERECO}
      EMPRESA_MUNICIPIO_IBGE: ${EMPRESA_MUNICIPIO_IBGE}
      EMPRESA_TELEFONES: ${EMPRESA_TELEFONES}
      EMPRESA_EMAIL: ${EMPRESA_EMAIL}
      EMPRESA_INSTAGRAM: ${EMPRESA_INSTAGRAM}
      # Logo/cor também no backend: o PDF baixa o logo (EMPRESA_LOGO_URL) e o injeta
      # como data: URI (rede bloqueada no render). Sem isto, PDF sai sem logo.
      EMPRESA_LOGO_URL: ${EMPRESA_LOGO_URL}
      EMPRESA_COR_PRIMARIA: ${EMPRESA_COR_PRIMARIA}

  frontend:
    # Imagem GENÉRICA (mesma do stack principal) — a marca agora vem das EMPRESA_* em RUNTIME,
    # então não há mais imagem por empresa nem rebuild para trocar logo/nome/cor.
    image: ${FRONTEND_IMAGE:-ghcr.io/martoxak/orcamento-frontend:latest}
    container_name: box-frontend
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: ${BACKEND_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Painel admin de templates PDF (/configuracoes/templates) — server-side only.
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      CONFIG_PANEL_PASSWORD: ${CONFIG_PANEL_PASSWORD}
      CONFIG_PANEL_SESSION_SECRET: ${CONFIG_PANEL_SESSION_SECRET}
      # White-label do frontend (runtime — troca logo/nome/cor sem rebuild)
      EMPRESA_NOME: ${EMPRESA_NOME}
      EMPRESA_CNPJ: ${EMPRESA_CNPJ}
      EMPRESA_ENDERECO: ${EMPRESA_ENDERECO}
      EMPRESA_EMAIL: ${EMPRESA_EMAIL}
      EMPRESA_TELEFONES: ${EMPRESA_TELEFONES}
      EMPRESA_WHATSAPP: ${EMPRESA_WHATSAPP}
      EMPRESA_LOGO_URL: ${EMPRESA_LOGO_URL}
      EMPRESA_COR_PRIMARIA: ${EMPRESA_COR_PRIMARIA}
    networks:
      - box_net
    ports:
      - "3035:3000"

volumes:
  box_postgres_data:

networks:
  box_net:
