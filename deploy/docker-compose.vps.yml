services:
  ts-webserver2:
    image: tailscale/tailscale:latest
    container_name: bomcusto-ts-webserver2
    hostname: bomcusto-webserver
    restart: always
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --accept-routes --advertise-tags=tag:container
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: false
    volumes:
      - tailscale_data:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE

  postgres:
    image: postgres:16-alpine
    container_name: bomcusto-postgres
    restart: always
    env_file:
      - stack.env
    networks:
      - app_net
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/martoxak/bomcusto-backend:latest}
    container_name: bomcusto-backend
    restart: always
    depends_on:
      - postgres
      - ts-webserver2
    env_file:
      - stack.env
    network_mode: service:ts-webserver2
    ports:
      - "4001:4000"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/martoxak/bomcusto-frontend:latest}
    container_name: bomcusto-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - stack.env
    networks:
      - app_net
      - shared_access_net
    ports:
      - "3001:3000"

volumes:
  postgres_data:

  tailscale_data:

networks:
  app_net: