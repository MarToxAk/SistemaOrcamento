services:
  postgres:
    image: postgres:16-alpine
    container_name: bomcusto-postgres
    restart: always
    env_file:
      - stack.env
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/martoxak/bomcusto-backend:latest}
    container_name: bomcusto-backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - stack.env
    network_mode: service:ts-webserver2

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/martoxak/bomcusto-frontend:latest}
    container_name: bomcusto-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - stack.env
    network_mode: service:ts-webserver2

volumes:
  postgres_data:
