services:
  ts-webserver2:
    image: tailscale/tailscale:latest
    container_name: orcamento-ts-webserver2
    hostname: orcamento-webserver
    restart: always
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --accept-routes --advertise-tags=tag:container
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: false
    volumes:
      - tailscale_data:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      - app_net # Adicionado Ã  rede para que outros o vejam
    ports:
      - "4001:4000"

  postgres:
    image: postgres:16-alpine
    container_name: orcamento-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - app_net
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/martoxak/orcamento-backend:latest}
    container_name: orcamento-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      ts-webserver2:
        condition: service_started
    network_mode: service:ts-webserver2
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      APP_BASE_URL: ${APP_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID}
      ATHOS_PG_HOST: ${ATHOS_PG_HOST}
      ATHOS_PG_DB: ${ATHOS_PG_DB}
      ATHOS_PG_USER: ${ATHOS_PG_USER}
      ATHOS_PG_PASS: ${ATHOS_PG_PASS}
      ATHOS_PG_PORT: ${ATHOS_PG_PORT}
      ATHOS_API_TOKEN: ${ATHOS_API_TOKEN}
      # Obrigatória (REQUIRED_ENV_VARS): id do usuário-sistema no Athos para escrita de produto.
      ATHOS_SISTEMA_USUARIO_ID: ${ATHOS_SISTEMA_USUARIO_ID}
      ATHOS_SMB_MOUNT_PATH: ${ATHOS_SMB_MOUNT_PATH}
      PDV_DB_URL: ${PDV_DB_URL}
      PDV_DB_SCHEMA: ${PDV_DB_SCHEMA}
      PDV_DB_READONLY_USER: ${PDV_DB_READONLY_USER}
      PDV_DB_READONLY_PASSWORD: ${PDV_DB_READONLY_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL}
      MINIO_PATH_PREFIX: ${MINIO_PATH_PREFIX}
      BACKEND_URL: ${BACKEND_URL}
      EFI_BASE_URL: ${EFI_BASE_URL}
      EFI_COBRANCA_BASE_URL: ${EFI_COBRANCA_BASE_URL}
      EFI_CLIENT_ID: ${EFI_CLIENT_ID}
      EFI_CLIENT_SECRET: ${EFI_CLIENT_SECRET}
      EFI_PIX_KEY: ${EFI_PIX_KEY}
      EFI_CERT_PEM: ${EFI_CERT_PEM}
      EFI_KEY_PEM: ${EFI_KEY_PEM}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      EFI_WEBHOOK_SECRET: ${EFI_WEBHOOK_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NFSE_TOKEN: ${NFSE_TOKEN}
      NFSE_CNPJ_PRESTADOR: ${NFSE_CNPJ_PRESTADOR}
      NFSE_INSCRICAO_MUNICIPAL: ${NFSE_INSCRICAO_MUNICIPAL}
      NFSE_SOAP_URL: ${NFSE_SOAP_URL}
      NFSE_AUX_URL: ${NFSE_AUX_URL}
      SMB_USER: ${SMB_USER}
      SMB_PASS: ${SMB_PASS}
      SMB_DOMAIN: ${SMB_DOMAIN}
      # White-label do PDF (runtime): o backend lê estas para montar o cabeçalho do
      # orçamento. EMPRESA_LOGO_URL é baixada e injetada como data: URI (rede bloqueada
      # no render). Sem elas o PDF sai sem marca/logo.
      EMPRESA_NOME: ${EMPRESA_NOME}
      EMPRESA_CNPJ: ${EMPRESA_CNPJ}
      EMPRESA_ENDERECO: ${EMPRESA_ENDERECO}
      EMPRESA_MUNICIPIO_IBGE: ${EMPRESA_MUNICIPIO_IBGE}
      EMPRESA_TELEFONES: ${EMPRESA_TELEFONES}
      EMPRESA_EMAIL: ${EMPRESA_EMAIL}
      EMPRESA_INSTAGRAM: ${EMPRESA_INSTAGRAM}
      EMPRESA_LOGO_URL: ${EMPRESA_LOGO_URL}
      EMPRESA_COR_PRIMARIA: ${EMPRESA_COR_PRIMARIA}

    # Volumes opcionais: descomente e configure ATHOS_SMB_HOST_MOUNT_PATH e ATHOS_SMB_MOUNT_PATH
    # somente se o host VPS tiver acesso direto ao share Samba e precisar de bind mount.
    # Com Tailscale, o backend usa SMB2 via TCP direto — nenhum mount é necessário.
    # volumes:
    #   - ${ATHOS_SMB_HOST_MOUNT_PATH}:${ATHOS_SMB_MOUNT_PATH}

    # Backend compartilha o namespace de rede do Tailscale para acessar a Tailnet.

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/martoxak/orcamento-frontend:latest}
    container_name: orcamento-frontend
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: ${BACKEND_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Painel admin de templates PDF (/configuracoes/templates) — server-side only.
      # Sem estas, o painel sobe fail-open (sem senha) e envia x-admin-api-key vazio (401 no backend).
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      CONFIG_PANEL_PASSWORD: ${CONFIG_PANEL_PASSWORD}
      CONFIG_PANEL_SESSION_SECRET: ${CONFIG_PANEL_SESSION_SECRET}
      # White-label do frontend (runtime — troca logo/nome/cor sem rebuild)
      EMPRESA_NOME: ${EMPRESA_NOME}
      EMPRESA_CNPJ: ${EMPRESA_CNPJ}
      EMPRESA_ENDERECO: ${EMPRESA_ENDERECO}
      EMPRESA_EMAIL: ${EMPRESA_EMAIL}
      EMPRESA_TELEFONES: ${EMPRESA_TELEFONES}
      EMPRESA_WHATSAPP: ${EMPRESA_WHATSAPP}
      EMPRESA_LOGO_URL: ${EMPRESA_LOGO_URL}
      EMPRESA_COR_PRIMARIA: ${EMPRESA_COR_PRIMARIA}
    networks:
      - app_net
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  tailscale_data:

networks:
  app_net:

