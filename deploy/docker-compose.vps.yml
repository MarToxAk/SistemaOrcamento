services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/martoxak/bomcusto-backend:latest}
    container_name: bomcusto-backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      APP_BASE_URL: ${APP_BASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID:-}
      ATHOS_PG_HOST: ${ATHOS_PG_HOST:-}
      ATHOS_PG_DB: ${ATHOS_PG_DB:-}
      ATHOS_PG_USER: ${ATHOS_PG_USER:-}
      ATHOS_PG_PASS: ${ATHOS_PG_PASS:-}
      ATHOS_PG_PORT: ${ATHOS_PG_PORT:-5432}
      PDV_DB_URL: ${PDV_DB_URL:-}
      PDV_DB_SCHEMA: ${PDV_DB_SCHEMA:-public}
      PDV_DB_READONLY_USER: ${PDV_DB_READONLY_USER:-}
      PDV_DB_READONLY_PASSWORD: ${PDV_DB_READONLY_PASSWORD:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_PORT: ${MINIO_PORT:-443}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-orcamento}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-}
      MINIO_PATH_PREFIX: ${MINIO_PATH_PREFIX:-quotes}
    ports:
      - "4000:4000"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/martoxak/bomcusto-frontend:latest}
    container_name: bomcusto-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      BACKEND_URL: ${BACKEND_URL:-http://backend:4000/api}
    ports:
      - "3000:3000"
