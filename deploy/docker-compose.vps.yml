services:
  postgres:
    image: postgres:16-alpine
    container_name: bomcusto-postgres
    restart: always
    env_file:
      - stack.env
    networks:
      - app_net
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/martoxak/bomcusto-backend:latest}
    container_name: bomcusto-backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - stack.env
    networks:
      - app_net
      - shared_access_net
    ports:
      - "4001:4000"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/martoxak/bomcusto-frontend:latest}
    container_name: bomcusto-frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - stack.env
    networks:
      - app_net
      - shared_access_net
    ports:
      - "3001:3000"

volumes:
  postgres_data:

networks:
  app_net:
  shared_access_net:
    external: true
    name: ts-webserver2
