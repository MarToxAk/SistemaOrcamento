<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
.grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px 6px; }
.cell { display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 2px; border:1px solid #ececec; border-radius:8px; background:#fff; }
.cell i { font-size: 22px; color: #222; }
.cell .n { font:600 9.5px/1 var(--font-mono); color: var(--ink-soft); text-align:center; }

</style></head><body><div class="card-wrap">
<p class="row-tag">Bootstrap Icons 1.11.1 · monoline only</p>
<div class="grid">
  <div class="cell"><i class="bi bi-eye"></i><span class="n">bi-eye</span></div>
  <div class="cell"><i class="bi bi-search"></i><span class="n">bi-search</span></div>
  <div class="cell"><i class="bi bi-plus-circle"></i><span class="n">bi-plus-circle</span></div>
  <div class="cell"><i class="bi bi-send"></i><span class="n">bi-send</span></div>
  <div class="cell"><i class="bi bi-check-circle"></i><span class="n">bi-check-circle</span></div>
  <div class="cell"><i class="bi bi-hourglass-split"></i><span class="n">bi-hourglass-split</span></div>
  <div class="cell"><i class="bi bi-exclamation-triangle-fill"></i><span class="n">bi-exclamation-…</span></div>
  <div class="cell"><i class="bi bi-info-circle-fill"></i><span class="n">bi-info-circle-…</span></div>
  <div class="cell"><i class="bi bi-pencil"></i><span class="n">bi-pencil</span></div>
  <div class="cell"><i class="bi bi-trash"></i><span class="n">bi-trash</span></div>
  <div class="cell"><i class="bi bi-x-lg"></i><span class="n">bi-x-lg</span></div>
  <div class="cell"><i class="bi bi-file-earmark-pdf"></i><span class="n">bi-file-…-pdf</span></div>
  <div class="cell"><i class="bi bi-printer"></i><span class="n">bi-printer</span></div>
  <div class="cell"><i class="bi bi-cash-coin"></i><span class="n">bi-cash-coin</span></div>
  <div class="cell"><i class="bi bi-receipt"></i><span class="n">bi-receipt</span></div>
  <div class="cell"><i class="bi bi-chat-dots"></i><span class="n">bi-chat-dots</span></div>
</div>
</div></body></html>
