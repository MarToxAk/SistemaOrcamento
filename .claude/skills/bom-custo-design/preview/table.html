<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
table { border-collapse:collapse; width:100%; font: 400 1.05rem/1.4 var(--font-ui); }
th { background:#f5f5f5; text-align:left; padding:.7rem .6rem; font-weight:700; color:#222; border-bottom:2px solid #ececec; }
td { padding:.7rem .6rem; border-bottom:1px solid #ececec; }
tr.paid { background:#effaf3; }
.pill { display:inline-block; padding:.22em .7em; border-radius:999px; font:600 .85rem/1.2 var(--font-ui); }
.s-aprovado { background:#e6fbe8; color:#1a7f37; }
.s-producao { background:#e3f0ff; color:#0d6efd; }

</style></head><body><div class="card-wrap">
<table>
  <thead><tr><th>Nº</th><th>Cliente</th><th>Total</th><th>Status</th></tr></thead>
  <tbody>
    <tr class="paid"><td>12450</td><td>Pousada Mar Azul</td><td>R$ 1.240,00</td><td><span class="pill s-aprovado">Aprovado</span></td></tr>
    <tr><td>12451</td><td>Padaria Ilhabela</td><td>R$ 380,00</td><td><span class="pill s-producao">Em Produção</span></td></tr>
    <tr><td>12452</td><td>Construtora Perequê</td><td>R$ 2.150,90</td><td><span class="pill s-aprovado">Aprovado</span></td></tr>
  </tbody>
</table>
</div></body></html>
