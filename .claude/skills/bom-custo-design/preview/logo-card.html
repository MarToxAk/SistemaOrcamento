<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .wrap { padding: 14px 16px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tile { border:1px solid var(--line); border-radius:10px; padding:10px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; gap:6px; min-height: 120px; }
  .tile img { width:100%; height:78px; object-fit:contain; }
  .tile.dark { background: #0c1b2a; border-color: #0c1b2a; }
  .tile.cream { background: var(--bg); }
  .lbl { font:600 10px/1.2 var(--font-mono); color: var(--ink-soft); text-align:center; }
  .tile.dark .lbl { color: #cbd5e1; }
</style></head><body>
<div class="wrap">
  <div class="grid">
    <div class="tile">
      <img src="../assets/logo-primary.png" alt="primary" />
      <div class="lbl">primary · full mark<br/>logo-primary.png</div>
    </div>
    <div class="tile cream">
      <img src="../assets/logo-wordmark.svg" alt="wordmark" />
      <div class="lbl">wordmark · no tagline<br/>logo-wordmark.svg</div>
    </div>
    <div class="tile dark">
      <img src="../assets/logo-white.png" alt="white" />
      <div class="lbl">white text · for dark bg<br/>logo-white.png</div>
    </div>
    <div class="tile">
      <img src="../assets/logo-mono.svg" alt="mono" />
      <div class="lbl">mono · single-color<br/>logo-mono.svg</div>
    </div>
  </div>
</div>
</body></html>
