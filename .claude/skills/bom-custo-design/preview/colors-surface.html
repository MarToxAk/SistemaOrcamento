<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
</style></head><body><div class="card-wrap">
<p class="row-tag">Surface &amp; accent</p>
<div class="swatch-row">
  <div class="sw"><div class="chip" style="background:#ffffff;border:1px solid #ececec"></div><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#f5f5f5"></div><div class="name">Surface soft</div><div class="hex">#F5F5F5</div></div>
  <div class="sw"><div class="chip" style="background:#ececec"></div><div class="name">Line</div><div class="hex">#ECECEC</div></div>
  <div class="sw"><div class="chip" style="background:#d7ccb7"></div><div class="name">Line warm</div><div class="hex">#D7CCB7</div></div>
  <div class="sw"><div class="chip" style="background:#0d6efd"></div><div class="name">Accent</div><div class="hex">#0D6EFD</div></div>
  <div class="sw"><div class="chip" style="background:#084298"></div><div class="name">Accent hover</div><div class="hex">#084298</div></div>
  <div class="sw"><div class="chip" style="background:#fd7e14"></div><div class="name">Accent warm</div><div class="hex">#FD7E14</div></div>
  <div class="sw"><div class="chip" style="background:#7dc8aa"></div><div class="name">CTA sage</div><div class="hex">#7DC8AA</div></div>
  <div class="sw"><div class="chip" style="background:#5b6772"></div><div class="name">Ink soft</div><div class="hex">#5B6772</div></div>
</div>
</div></body></html>
