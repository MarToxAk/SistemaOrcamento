<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
</style></head><body><div class="card-wrap">
<p class="row-tag">Signature pastel header gradient · 135°</p>
<div style="height:84px;border-radius:10px;background:linear-gradient(135deg,#c5f2e8 0%,#cbe1f9 25%,#e7d8f9 50%,#f9e7f5 75%,#f0cacb 100%);border:1px solid #ececec;"></div>
<div class="swatch-row" style="margin-top:14px">
  <div class="sw"><div class="chip" style="background:#c5f2e8"></div><div class="name">Mint</div><div class="hex">#C5F2E8</div></div>
  <div class="sw"><div class="chip" style="background:#cbe1f9"></div><div class="name">Sky</div><div class="hex">#CBE1F9</div></div>
  <div class="sw"><div class="chip" style="background:#e7d8f9"></div><div class="name">Lavender</div><div class="hex">#E7D8F9</div></div>
  <div class="sw"><div class="chip" style="background:#f9e7f5"></div><div class="name">Pink</div><div class="hex">#F9E7F5</div></div>
  <div class="sw"><div class="chip" style="background:#f0cacb"></div><div class="name">Peach</div><div class="hex">#F0CACB</div></div>
</div>
</div></body></html>
