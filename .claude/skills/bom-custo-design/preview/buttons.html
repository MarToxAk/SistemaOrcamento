<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
.btn { display:inline-flex; align-items:center; gap:6px; border:none; padding:.55rem 1rem; border-radius:8px; font:700 .95rem/1 var(--font-ui); cursor:pointer; }
.btn-primary { background:#0d6efd; color:#fff; }
.btn-primary:hover { background:#084298; }
.btn-outline-primary { background:#fff; color:#0d6efd; border:1px solid #0d6efd; }
.btn-outline-warning { background:#fff; color:#bfa100; border:1px solid #ffe18a; }
.btn-add { background:#7dc8aa; color:#fff; padding:.6rem 1.4rem; border-radius:6px; }
.btn-add:hover { background:#6ab594; }
.btn-sm { font-size:.85rem; padding:.4rem .8rem; }
.row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.row .lbl { font:700 10px/1 var(--font-ui); text-transform:uppercase; letter-spacing:.08em; color:#0e6d73; width:90px; }

</style></head><body><div class="card-wrap">
<div class="row"><span class="lbl">Primary</span>
  <button class="btn btn-primary"><i class="bi bi-send"></i> Enviar Link</button>
  <button class="btn btn-primary btn-sm"><i class="bi bi-search"></i> Carregar</button>
  <button class="btn btn-primary" disabled style="opacity:.7">Disabled</button>
</div>
<div class="row"><span class="lbl">Outline</span>
  <button class="btn btn-outline-primary btn-sm"><i class="bi bi-eye"></i></button>
  <button class="btn btn-outline-primary btn-sm">Detalhes</button>
  <button class="btn btn-outline-warning btn-sm"><i class="bi bi-send"></i> Enviar Link</button>
</div>
<div class="row"><span class="lbl">CTA Sage</span>
  <button class="btn btn-add"><i class="bi bi-plus-circle"></i> Adicionar Orçamento</button>
</div>
</div></body></html>
