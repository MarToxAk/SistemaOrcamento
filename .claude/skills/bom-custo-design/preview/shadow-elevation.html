<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
</style></head><body><div class="card-wrap">
<p class="row-tag">Two elevations · nothing else</p>
<div style="display:flex;gap:24px;align-items:flex-end;padding:14px 6px">
  <div style="background:#fff;width:170px;height:90px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--font-mono);color:#5b6772">shadow-sm · card</div>
  <div style="background:#fff;width:170px;height:90px;border-radius:14px;box-shadow:0 8px 32px rgba(31,31,31,0.08);display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--font-mono);color:#5b6772">shadow-md · modal</div>
  <div style="background:#fff;width:170px;height:90px;border-radius:18px;box-shadow:0 18px 30px rgba(12,27,42,0.08);display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--font-mono);color:#5b6772">shadow-lg · shell</div>
</div>
</div></body></html>
