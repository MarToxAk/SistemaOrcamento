<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
.al { padding: .9rem 1rem; border-radius: 10px; border: 1px solid transparent; margin-bottom:8px; font:500 1rem/1.4 var(--font-ui); display:flex; gap:10px; align-items:flex-start; }
.al i { margin-top:2px; }
.al--success { background:#e6fbe8; color:#1a7f37; border-color:#b6e2c1; }
.al--info    { background:#f0f4ff; color:#0d47a1; border-color:#b6c6e2; }
.al--danger  { background:#fdecec; color:#ee3637; border-color:#f5b5b5; }
.al--warn    { background:#fff8d6; color:#bfa100; border-color:#ffe18a; }

</style></head><body><div class="card-wrap">
<div class="al al--success"><i class="bi bi-check-circle-fill"></i><div><b>Orçamento enviado.</b> O cliente receberá o link em instantes.</div></div>
<div class="al al--info"><i class="bi bi-info-circle-fill"></i><div>Validade da proposta: 7 dias a partir da emissão.</div></div>
<div class="al al--danger"><i class="bi bi-exclamation-triangle-fill"></i><div><b>Acesso Restrito.</b> Esta página só pode ser acessada através do Chatwoot Dashboard.</div></div>
<div class="al al--warn"><i class="bi bi-hourglass-split"></i><div>Aguardando aprovação do cliente.</div></div>
</div></body></html>
