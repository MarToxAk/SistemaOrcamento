<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
</style></head><body><div class="card-wrap">
<p class="row-tag">Logo pigments</p>
<div class="swatch-row">
  <div class="sw"><div class="chip" style="background:#FAED23"></div><div class="name">Brand yellow</div><div class="hex">#FAED23</div></div>
  <div class="sw"><div class="chip" style="background:#EE3537"></div><div class="name">Brand red</div><div class="hex">#EE3537</div></div>
  <div class="sw"><div class="chip" style="background:#14A958"></div><div class="name">Brand green</div><div class="hex">#14A958</div></div>
  <div class="sw"><div class="chip" style="background:#0F7949"></div><div class="name">Forest</div><div class="hex">#0F7949</div></div>
  <div class="sw"><div class="chip" style="background:#f9f7ed"></div><div class="name">Paper bg</div><div class="hex">#f9f7ed</div></div>
  <div class="sw"><div class="chip" style="background:#222"></div><div class="name">Ink</div><div class="hex" style="color:#999">#222222</div></div>
</div>
</div></body></html>
