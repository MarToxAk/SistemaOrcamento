<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
<style>
  html, body { margin:0; padding:0; background:#fff; }
  .card-wrap { padding: 18px 20px; }
  .swatch-row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width: 110px; }
  .sw .chip { height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font: 600 11px/1.2 var(--font-ui); color: var(--ink); margin-top:6px; }
  .sw .hex  { font: 500 10.5px/1.2 var(--font-mono); color: var(--ink-soft); margin-top:2px; }
  .row-tag { font: 700 10px/1 var(--font-ui); text-transform: uppercase; letter-spacing: .08em; color: var(--teal); margin: 0 0 10px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  
.spec { display:flex; align-items:baseline; gap:18px; padding: 6px 0; border-bottom: 1px dashed #ececec; }
.spec:last-child { border-bottom:none; }
.spec .meta { font:600 11px/1 var(--font-mono); color: var(--ink-soft); width: 92px; }

</style></head><body><div class="card-wrap">
<div class="spec"><span class="meta">2.2rem · 800</span><span style="font:800 2.2rem/1.1 var(--font-ui)">Lista de Orçamentos</span></div>
<div class="spec"><span class="meta">1.7rem · 700</span><span style="font:700 1.7rem/1.15 var(--font-ui)">Bom Custo Papelaria</span></div>
<div class="spec"><span class="meta">1.35rem · 700</span><span style="font:700 1.35rem/1.2 var(--font-ui)">Orçamento Nº 12450</span></div>
<div class="spec"><span class="meta">1.18rem · 400</span><span style="font:400 1.18rem/1.4 var(--font-ui)">Pagamento confirmado no caixa.</span></div>
<div class="spec"><span class="meta">1.05rem · 400</span><span style="font:400 1.05rem/1.5 var(--font-ui)">CNPJ: 62.391.927/0001-57</span></div>
<div class="spec"><span class="meta">0.78rem · 700 caps</span><span style="font:700 0.78rem/1 var(--font-ui);text-transform:uppercase;letter-spacing:.08em;color:#0e6d73">Nº do orçamento</span></div>
</div></body></html>
