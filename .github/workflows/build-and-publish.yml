name: "Build and Publish Docker images"

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        id: dockerhub
        shell: bash
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets ausentes; workflow sera encerrado sem push."
          fi

      - name: Setup buildx
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bomcusto-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bomcusto-backend:latest

      - name: Build and push frontend image
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bomcusto-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bomcusto-frontend:latest

      - name: End gracefully when Docker Hub is not configured
        if: ${{ steps.dockerhub.outputs.enabled != 'true' }}
        run: echo "Build and publish ignorado porque DOCKERHUB_USERNAME/DOCKERHUB_TOKEN nao estao configurados."
