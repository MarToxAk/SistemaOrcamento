name: "Deploy to VPS via SSH"

on:
  workflow_run:
    workflows: ["Build and Publish Docker images"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on remote via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "Logging into Docker Hub..."
            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin || true
            fi
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose -f deploy/docker-compose.vps.yml pull
            docker compose -f deploy/docker-compose.vps.yml up -d --remove-orphans
