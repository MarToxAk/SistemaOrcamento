name: "Deploy to VPS via SSH"

on:
  workflow_run:
    workflows: ["Build and Publish Docker images"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate SSH deploy secrets
        id: ssh
        shell: bash
        run: |
          if [ -n "${{ secrets.SSH_HOST }}" ] && [ -n "${{ secrets.SSH_USER }}" ] && [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] && [ -n "${{ secrets.SSH_PORT }}" ] && [ -n "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Segredos SSH ausentes; deploy remoto sera ignorado."
          fi

      - name: Deploy on remote via SSH
        if: ${{ steps.ssh.outputs.enabled == 'true' }}
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "Logging into Docker Hub..."
            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin || true
            fi
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose -f deploy/docker-compose.vps.yml pull
            docker compose -f deploy/docker-compose.vps.yml up -d --remove-orphans

      - name: End gracefully when SSH deploy is not configured
        if: ${{ steps.ssh.outputs.enabled != 'true' }}
        run: echo "Deploy via SSH ignorado porque segredos obrigatorios nao estao configurados."
