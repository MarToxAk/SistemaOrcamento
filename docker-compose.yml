services:
  postgres:
    image: postgres:16-alpine
    container_name: bomcusto-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bomcusto
    ports:
      - "5435:5432"
    volumes:
      - bomcusto_pg_data:/var/lib/postgresql/data

volumes:
  bomcusto_pg_data:
